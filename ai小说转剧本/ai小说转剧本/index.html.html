<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说转剧本</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #fff;
            color: #111;
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .card {
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            min-height: 180px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1rem;
            font-size: 1rem;
            resize: vertical;
            outline: none;
        }

        textarea:focus {
            border-color: #888;
        }

        .tip {
            font-size: 0.85rem;
            color: #666;
            margin: 0.5rem 0 1rem;
        }

        button {
            background-color: #222;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.8rem 1.6rem;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-title {
            font-size: 1.25rem;
            margin: 2rem 0 1rem;
            font-weight: 600;
        }

        #result {
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 100px;
            padding: 1rem;
            border-radius: 8px;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>小说片段转剧本</h1>
        <textarea id="novelInput" placeholder="请输入小说片段（500字以内）"></textarea>
        <div class="tip">最多输入500个字符</div>
        <button id="convertBtn">转换为剧本</button>
    </div>

    <div class="result-title">剧本内容</div>
    <div id="result" class="card"></div>

    <script>
        const input = document.getElementById('novelInput');
        const btn = document.getElementById('convertBtn');
        const result = document.getElementById('result');

        btn.addEventListener('click', async () => {
            let text = input.value.trim();
            if (!text) {
                alert('请输入小说内容');
                return;
            }
            if (text.length > 5000) {
                alert('内容不能超过5000字');
                return;
            }

            btn.disabled = true;
            btn.textContent = '正在生成剧本，请稍候（约需15秒）...'
            result.textContent = '⏳ 正在调用AI生成剧本，请稍候...';

            try {
                const res = await fetch('http://localhost:5000/convert', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ novel_text: text })
                });

                if (!res.ok) throw new Error('请求失败');
                const data = await res.json();
                // 假设返回格式 { script: "xxx" }
                result.innerHTML = (data.script || '无返回内容').replace(/\n/g, '<br>');
            } catch (err) {
                result.textContent = '转换失败：' + err.message;
            } finally {
                btn.disabled = false;
                btn.textContent = '转换为剧本';
            }
        });
    </script>
</body>
</html>
